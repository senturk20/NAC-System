# ============================================================
# FreeRADIUS - Client Definitions
# ============================================================
# A "client" in RADIUS terms is a network device (switch, AP, VPN)
# that sends authentication requests TO this RADIUS server.
# Each client must have a shared secret for security.
# ============================================================

# Allow connections from ANY IP address.
# WHY 0.0.0.0/0: In our Docker setup, containers get dynamic IPs,
# so we allow all and rely on the shared secret for security.
# In production, you would restrict this to specific switch/AP IPs.
client dockernet {
    ipaddr = 0.0.0.0/0
    secret = testing123
}
